<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignaSure - Forgot Password</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="login-shell theme-shell">
    <section class="split-login-card">
        <section class="login-visual-pane">
            <div class="login-logo-wrap login-logo-left">
                <img src="/images/IT21Logo.png" alt="SignaSure logo" class="brand-logo login-logo">
            </div>
        </section>

        <section class="login-form-pane">
            <div class="form-head">
                <p class="login-kicker">Reset your password</p>
                <p class="form-subtitle">Enter the email associated with your account and we'll send you a link to reset your password.</p>
            </div>

            <div th:if="${statusMessage}" class="message-banner success-banner">
                <p th:text="${statusMessage}"></p>
            </div>
            <div th:if="${errorMessage}" class="message-banner error-banner">
                <p th:text="${errorMessage}"></p>
            </div>

            <form class="auth-form theme-auth-form" action="/forgot-password" method="post">
                <label>
                    Email
                    <input type="email" name="email" placeholder="username@example.com" required>
                </label>

                <button type="submit" class="primary-button">Send Reset Link</button>
            </form>

            <p class="login-footer footer-text">Remembered your password? <a href="/login">Log in</a></p>
        </section>
    </section>
</main>
</body>
</html>
