<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignaSure - Reset Password</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="login-shell theme-shell">
    <section class="split-login-card">
        <section class="login-visual-pane">
            <div class="login-logo-wrap login-logo-left">
                <img src="/images/IT21Logo.png" alt="SignaSure logo" class="brand-logo login-logo">
            </div>
        </section>

        <section class="login-form-pane">
            <div class="form-head">
                <p class="login-kicker">Set a new password</p>
            </div>

            <div th:if="${statusMessage}" class="message-banner success-banner">
                <p th:text="${statusMessage}"></p>
            </div>
            <div th:if="${errorMessage}" class="message-banner error-banner">
                <p th:text="${errorMessage}"></p>
            </div>

            <form class="auth-form theme-auth-form" action="/reset-password" method="post" data-password-policy>
                <input type="hidden" name="token" th:value="${token}">

                <label>
                    New Password
                    <div class="password-row">
                        <input type="password" id="passwordField" name="password" placeholder="Password" required>
                        <button type="button" class="password-toggle" data-target="passwordField">Show</button>
                    </div>
                    <div class="password-policy">
                        <p>Password requirements</p>
                        <ul>
                            <li data-policy-rule="length">At least 8 characters</li>
                            <li data-policy-rule="uppercase">At least one uppercase letter</li>
                            <li data-policy-rule="lowercase">At least one lowercase letter</li>
                            <li data-policy-rule="digit">At least one digit</li>
                            <li data-policy-rule="special">At least one special character</li>
                            <li data-policy-rule="whitespace">No whitespace characters</li>
                        </ul>
                    </div>
                </label>

                <label>
                    Confirm password
                    <div class="password-field">
                        <input type="password" id="confirmPasswordField" name="confirmPassword" required>
                        <button type="button" class="password-toggle" data-target="confirmPasswordField" aria-label="Show password">Show</button>
                    </div>
                    <p class="policy-confirm-message"></p>
                </label>

                <button type="submit" class="primary-button">Reset Password</button>
            </form>

            <p class="login-footer footer-text">Remembered it after all? <a href="/login">Log in</a></p>
        </section>
    </section>
</main>
<script src="/js/password-policy.js"></script>
<script>
    document.querySelectorAll('.password-toggle').forEach(button => {
        button.addEventListener('click', () => {
            const targetId = button.dataset.target;
            const target = document.getElementById(targetId);
            if (!target) return;
            if (target.type === 'password') {
                target.type = 'text';
                button.textContent = 'Hide';
            } else {
                target.type = 'password';
                button.textContent = 'Show';
            }
        });
    });
</script>
</body>
</html>
