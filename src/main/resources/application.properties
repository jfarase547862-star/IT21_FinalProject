spring.application.name=IT21_FinalProject
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
server.port=${PORT:8081}

# Initialize SQL scripts on startup (schema.sql runs before data.sql)
spring.sql.init.mode=always

# PostgreSQL datasource
# Render: set DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD (do NOT set SPRING_DATASOURCE_URL)
# Alternative: paste Internal Database URL as DATABASE_URL (postgresql://user:pass@host/db)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:it21_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Optional: public app URL for password-reset links (set on Render, e.g. https://your-app.onrender.com)
app.base-url=${APP_BASE_URL:}
app.mail.from=${MAIL_FROM:${spring.mail.username}}